name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy na serwer OVH przez SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Zaloguj do GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Zatrzymaj i usuń poprzedni kontener (jeśli istnieje)
            docker stop my-app-${{ secrets.VPS_PORT_NUMBER }} || true
            docker rm my-app-${{ secrets.VPS_PORT_NUMBER }} || true

            # Pobierz najnowszy obraz
            docker pull ghcr.io/${{ github.repository_owner }}/my-first_cicd:latest

            # Uruchom kontener na porcie studenta
            docker run -d \
              --name my-app-${{ secrets.VPS_PORT_NUMBER }} \
              --restart unless-stopped \
              -p 8${{ secrets.VPS_PORT_NUMBER }}:80 \
              ghcr.io/${{ github.repository_owner }}/my-first_cicd:latest
